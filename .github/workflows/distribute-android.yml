name: Build and distribute Android preview

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version to deploy (X.Y.Z); must be newer than the latest release"
        required: false
        type: string
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "*.md"

concurrency:
  group: android-preview
  cancel-in-progress: false

jobs:
  verify-build-distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deployment version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version || '' }}
        run: |
          VERSION="$(node scripts/resolve-deploy-version.mjs "$REQUESTED_VERSION" --write)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version $VERSION"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify application
        run: |
          pnpm typecheck
          pnpm test
          pnpm exec expo install --check

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEPTUNCLIENT_APP }}

      - name: Build signed preview APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm dlx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json > eas-build.json
          jq -r '.[0].artifacts.buildUrl' eas-build.json > apk-url.txt
          curl --fail --location --output NeptunClient-preview.apk "$(cat apk-url.txt)"

      - name: Distribute to Firebase testers
        env:
          RELEASE_NOTES: ${{ format('Neptun {0} — {1}', steps.version.outputs.version, github.event.head_commit.message || format('Manual build from {0}', github.sha)) }}
        run: |
          pnpm dlx firebase-tools appdistribution:distribute NeptunClient-preview.apk \
            --app 1:881804148221:android:e6eba8a4001d4e9911ad94 \
            --project neptunclient-app \
            --groups internal-testers \
            --release-notes "$RELEASE_NOTES" 2>&1 | \
            sed -E 's#https://firebaseappdistribution.googleapis.com/app-binary-downloads/[^[:space:]]+#<temporary-download-url-redacted>#g'

      - name: Record deployed version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "v$VERSION" --message "Android preview v$VERSION"
          git push origin "v$VERSION"
